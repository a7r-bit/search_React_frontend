server {
    listen 80;

    location / {
        include mime.types;
        default_type application/octet-stream;
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://nest_app:3000;
    }
}

server {
    listen 5555;
    server_name _;

    location / {
        proxy_pass http://nest_app:5555;
    }
}
server {
    server_name _;
    listen 50051 http2;
    location / {
        grpc_pass grpc://nest_app:50051;
    }
}